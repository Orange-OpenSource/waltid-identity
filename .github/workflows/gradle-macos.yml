name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@673fe43225d52476b3d2e6fd7954260bb7df2b89
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@673fe43225d52476b3d2e6fd7954260bb7df2b89

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@673fe43225d52476b3d2e6fd7954260bb7df2b89
        with:
          waltid-directory: 'waltid-identity'